<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — Daohacookies</title>
  <meta name="description" content="Finalize seu pedido de cookies artesanais." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <script type="module" defer src="/js/app.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">Daohacookies</a>
      <nav class="main-nav" aria-label="Principal">
        <ul>
          <li><a href="/">Início</a></li>
          <li><a href="/#produtos">Produtos</a></li>
          <li><a href="/carrinho.html">Carrinho <span data-cart-count></span></a></li>
          <li><a href="/sobre.html">Sobre</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-head">
      <div class="container">
        <span class="section-eyebrow">Último passo</span>
        <h1>Finalizar compra</h1>
        <p>Seus dados são usados apenas para a entrega da fornada. Nenhum cadastro é criado.</p>
      </div>
    </section>

    <section>
      <div class="container checkout-wrap">
        <form data-checkout-form novalidate>
          <div class="field-group">
            <h2>Contato</h2>
            <div class="fields cols-2">
              <div class="field">
                <label for="nome">Nome completo</label>
                <input id="nome" name="nome" type="text" required minlength="3" placeholder="Seu nome" />
              </div>
              <div class="field">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" required placeholder="voce@exemplo.com" />
              </div>
              <div class="field">
                <label for="telefone">Telefone</label>
                <input id="telefone" name="telefone" type="tel" required pattern="[0-9\s\(\)\-\+]{10,}" placeholder="(11) 99999-0000" />
              </div>
              <div class="field">
                <label for="cep">CEP</label>
                <input id="cep" name="cep" type="text" required pattern="\d{5}-?\d{3}" placeholder="00000-000" />
              </div>
            </div>
          </div>

          <div class="field-group">
            <h2>Entrega</h2>
            <div class="fields cols-3">
              <div class="field">
                <label for="endereco">Endereço</label>
                <input id="endereco" name="endereco" type="text" required placeholder="Rua, avenida..." />
              </div>
              <div class="field">
                <label for="numero">Número</label>
                <input id="numero" name="numero" type="text" required placeholder="123" />
              </div>
              <div class="field">
                <label for="complemento">Complemento</label>
                <input id="complemento" name="complemento" type="text" placeholder="Apto, bloco" />
              </div>
            </div>
            <div class="fields cols-2" style="margin-top:1.25rem">
              <div class="field">
                <label for="cidade">Cidade</label>
                <input id="cidade" name="cidade" type="text" required placeholder="São Paulo" />
              </div>
              <div class="field">
                <label for="estado">Estado</label>
                <input id="estado" name="estado" type="text" required minlength="2" maxlength="2" placeholder="SP" />
              </div>
            </div>
          </div>

          <div class="field-group">
            <h2>Pagamento</h2>
            <div class="fields">
              <div class="field">
                <label for="pagamento">Forma de pagamento</label>
                <select id="pagamento" name="pagamento" required>
                  <option value="">Selecione...</option>
                  <option value="pix">Pix</option>
                  <option value="cartao">Cartão de crédito</option>
                  <option value="boleto">Boleto bancário</option>
                </select>
              </div>
              <div class="field">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" placeholder="Restrição alimentar, recado para o entregador..."></textarea>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit">Confirmar pedido</button>
          </div>
        </form>

        <aside class="summary" aria-label="Resumo do pedido" data-cart-summary>
          <h2>Seu pedido</h2>
        </aside>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <ul>
        <li><a href="/">Início</a></li>
        <li><a href="/sobre.html">Sobre</a></li>
        <li><a href="/carrinho.html">Carrinho</a></li>
      </ul>
      <p>© Daohacookies — São Paulo</p>
    </div>
  </footer>
</body>

</html>
